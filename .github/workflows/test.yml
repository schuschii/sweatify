name: Run Laravel Tests

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h mysql --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.ci to .env
        run: cp sweatify/.env.ci sweatify/.env

      - name: Verify .env file
        run: cat sweatify/.env  # Debug to confirm .env content

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, mysql
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd sweatify
          composer install --no-interaction --prefer-dist
        
      - name: Check MySQL client connectivity
        run: |
          mysql -h 127.0.0.1 -u sail -ppassword -e "SELECT 1" || echo "MySQL client connection failed"
          

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -u sail -ppassword -e "SELECT 1" &> /dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Debug Laravel environment
        run: |
          cd sweatify
          php artisan env  # Show current environment
          php artisan config:show database --env=testing  # Show database config

      - name: Debug MySQL connection
        run: |
          cd sweatify
          php artisan db:monitor --env=testing

      - name: Generate Laravel app key
        run: |
          cd sweatify
          php artisan key:generate --ansi

      - name: Run migrations with seeding
        run: |
          cd sweatify
          php artisan migrate --env=testing --seed --force

      - name: Run Laravel tests
        run: |
          cd sweatify
          php artisan test
