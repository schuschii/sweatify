name: Run Laravel Tests

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.testing to .env
        run: cp sweatify/.env.testing .env

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, mysql
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd sweatify
          composer install --no-interaction --prefer-dist
        

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h mysql -u sail -ppassword --silent 2>/dev/null; do
            sleep 1
          done

      - name: Run migrations with seeding
        run: |
          cd sweatify
          php artisan migrate --env=testing --seed --force

      - name: Run Laravel tests
        run: |
          cd sweatify
          php artisan test
