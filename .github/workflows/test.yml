name: Run Laravel Tests

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h mysql --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.ci to .env
        run: cp sweatify/.env.ci sweatify/.env

      - name: Verify .env file
        run: cat sweatify/.env  # Debug to confirm .env content

      - name: List environment files
        run: ls -la sweatify/  # Check for conflicting .env files

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, mysql
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd sweatify
          composer install --no-interaction --prefer-dist

      - name: Generate Laravel app key
        run: |
          cd sweatify
          php artisan key:generate --ansi
          
      - name: Inject Laravel APP_KEY manually
        run: |
          cd sweatify
          APP_KEY=$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")
          echo "APP_KEY=$APP_KEY" >> .env

      - name: Clear Laravel config cache
        run: |
          cd sweatify
          php artisan config:clear
          php artisan cache:clear
          
      - name: Debug Laravel environment
        run: |
          cd sweatify
          php artisan env  # Show current environment
          php artisan config:show database  # Show database config
          php artisan tinker --execute="echo config('database.connections.mysql.host');"

      - name: List Docker containers
        run: docker ps -a


      - name: Check MySQL client connectivity
        run: |
          mysql -h mysql -u sail -ppassword -e "SELECT 1" || echo "MySQL client connection failed"


      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h mysql -u sail -ppassword --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: Debug MySQL connection
        run: |
          cd sweatify
          php artisan db:monitor 


      - name: Run migrations with seeding
        run: |
          cd sweatify
          php artisan migrate --seed --force

      - name: Run Laravel tests
        run: |
          cd sweatify
          php artisan test
